services:
  postgres:
    image: postgres:16-alpine
    container_name: nupm-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: pwd
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./infra/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d postgres']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - nupm-net

  postgres-replica:
    # Phase 13 — streaming-replication standby. App `*_READ_DB_URL` env points
    # here; writes hit the primary (`postgres`) only.
    image: postgres:16-alpine
    container_name: nupm-postgres-replica
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: pwd
    ports:
      - '5433:5432'
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
      - ./infra/postgres/replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    entrypoint: ['/usr/local/bin/replica-entrypoint.sh']
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U app -d postgres && psql -U app -d postgres -tAc "SELECT pg_is_in_recovery()" | grep -q t'
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    networks:
      - nupm-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nupm-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nupm-net

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: nupm-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=24h'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ['CMD', 'wget', '-qO', '/dev/null', 'http://localhost:9090/-/healthy']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - nupm-net

  jaeger:
    image: jaegertracing/all-in-one:1.63.0
    container_name: nupm-jaeger
    ports:
      - '16686:16686' # Jaeger UI
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://localhost:14269/ || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - nupm-net

  grafana:
    image: grafana/grafana:11.3.0
    container_name: nupm-grafana
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - nupm-net

volumes:
  postgres-data:
  postgres-replica-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:

networks:
  nupm-net:
    name: nupm-net
    driver: bridge
