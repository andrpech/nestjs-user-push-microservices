apiVersion: 1

datasources:
  - name: Prometheus
    uid: nupm-prom
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 5s
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: nupm-jaeger

  - name: Jaeger
    uid: nupm-jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false
