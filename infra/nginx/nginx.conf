events {}

http {
	# Docker's embedded DNS so backend replica IPs are re-resolved on the fly.
	resolver 127.0.0.11 valid=5s ipv6=off;

	log_format main '$remote_addr "$request" $status -> $upstream_addr ($upstream_response_time s)';
	access_log /var/log/nginx/access.log main;

	# Variables in proxy_pass force per-request DNS resolution (vs a stale
	# upstream block that resolves once at startup). Combined with Docker's
	# round-robin DNS, this gives N-replica load balancing without nginx-plus.

	server {
		listen 80;

		# users service: POST /users and the public health endpoints
		location = /lhealth {
			set $users_backend users:3000;
			proxy_pass http://$users_backend;
		}

		location = /rhealth {
			set $users_backend users:3000;
			proxy_pass http://$users_backend;
		}

		location /users {
			set $users_backend users:3000;
			proxy_pass http://$users_backend;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_http_version 1.1;
		}

		# Reserved for phase 11+ admin endpoints on the notifier service.
		location /admin/ {
			set $notifier_backend notifier:3001;
			proxy_pass http://$notifier_backend;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_http_version 1.1;
		}

		# nginx's own readiness probe — unrelated to backend health.
		location = /ngx-health {
			access_log off;
			return 200 'ok';
		}
	}
}
