# Phase 13 — streaming replication primary config.

listen_addresses = '*'
max_connections = 100

# Write-ahead log + replication
wal_level = replica
max_wal_senders = 5
max_replication_slots = 5
hot_standby = on
hot_standby_feedback = on
wal_keep_size = 256MB

# Logging — keep dev quiet
log_min_messages = warning
log_connections = off
log_disconnections = off
