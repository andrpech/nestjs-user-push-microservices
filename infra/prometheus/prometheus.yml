global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Both users replicas via Docker DNS A records
  - job_name: 'users'
    metrics_path: /metrics
    dns_sd_configs:
      - names: ['users']
        type: A
        port: 3000

  # Both notifier replicas via Docker DNS A records
  - job_name: 'notifier'
    metrics_path: /metrics
    dns_sd_configs:
      - names: ['notifier']
        type: A
        port: 3001

  # Singleton scheduler — static target by container name
  - job_name: 'scheduler'
    metrics_path: /metrics
    static_configs:
      - targets: ['scheduler:3002']
