events {}

http {
	# Returns 200 for every POST to /hook and a fixed body to /health for the
	# compose healthcheck. Used as the destination for e2e webhook delivery.
	log_format hook '$remote_addr "$request" $status body=$request_body';
	access_log /var/log/nginx/access.log hook;

	server {
		listen 80;

		# Read the request body into a variable so the access log captures it.
		client_body_buffer_size 16k;
		client_max_body_size 1m;

		location = /health {
			return 200 'ok';
			add_header Content-Type text/plain;
		}

		location /hook {
			return 200 'received';
			add_header Content-Type text/plain;
		}

		location / {
			return 404;
		}
	}
}
